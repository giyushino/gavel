<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gavel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:     #0b0a08;
    --s1:     #131210;
    --s2:     #1a1916;
    --b1:     #252320;
    --b2:     #32302c;
    --b3:     #424038;
    --text:   #eeeae4;
    --muted:  #a09890;
    --hi:     #f8f5f0;
    --green:  #6a9e76;
    --gd:     #0c1a10;
    --red:    #a85252;
    --amber:  #b08840;
  }
  body {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 17px;
    line-height: 1.6;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--b2); }

  /* ── header ── */
  header {
    display: flex;
    align-items: center;
    padding: 0 24px;
    background: var(--s1);
    border-bottom: 1px solid var(--b1);
    flex-shrink: 0;
    height: 46px;
    gap: 32px;
  }
  header h1 {
    font-size: 21px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: var(--hi);
    font-style: italic;
  }
  nav { display: flex; gap: 0; height: 100%; }
  nav button {
    background: none;
    border: none;
    border-bottom: 1px solid transparent;
    color: var(--muted);
    cursor: pointer;
    padding: 0 16px;
    height: 100%;
    font-family: inherit;
    font-size: 16px;
    letter-spacing: 0.2px;
  }
  nav button.active { color: var(--hi); border-bottom-color: var(--hi); }
  nav button:hover:not(.active) { color: var(--text); }

  /* ── main layout ── */
  .workspace { display: flex; flex: 1; overflow: hidden; }

  /* ── left panel ── */
  .left {
    width: 400px;
    flex-shrink: 0;
    border-right: 1px solid var(--b1);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    background: var(--s1);
  }
  .section {
    padding: 14px 18px;
    border-bottom: 1px solid var(--b1);
  }
  .section-title {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  label {
    display: block;
    font-size: 15px;
    font-style: italic;
    color: var(--muted);
    margin-bottom: 3px;
    margin-top: 10px;
  }
  label:first-of-type { margin-top: 0; }
  input, select, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--b2);
    color: var(--text);
    padding: 6px 9px;
    font-family: inherit;
    font-size: 16px;
    border-radius: 0;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--b3);
    border-left: 2px solid var(--hi);
  }
  select { cursor: pointer; }
  select option { background: var(--s1); }
  textarea { resize: vertical; font-family: 'EB Garamond', Georgia, serif; }

  /* ── cache banner ── */
  #cache-banner {
    display: none;
    background: var(--gd);
    border: 1px solid var(--green);
    border-left: 3px solid var(--green);
    padding: 10px 12px;
    margin-top: 10px;
  }
  #cache-banner.show { display: block; }
  #cache-banner .banner-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--green);
    margin-bottom: 3px;
  }
  #cache-banner .banner-meta { font-size: 15px; color: var(--muted); }
  .toggle-row { display: flex; gap: 6px; margin-top: 8px; }
  .toggle-btn {
    flex: 1;
    padding: 5px 8px;
    font-family: inherit;
    font-size: 15px;
    border: 1px solid var(--b2);
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    text-align: center;
    border-radius: 0;
  }
  .toggle-btn.active {
    border-color: var(--green);
    color: var(--green);
    background: var(--gd);
  }
  #grader-server-widget {
    display: none;
    margin-top: 8px;
    padding: 10px;
    background: var(--bg);
    border: 1px solid var(--b1);
  }
  #grader-server-widget.show { display: block; }
  .server-status { display: flex; align-items: center; gap: 8px; font-size: 15px; }
  .dot { width: 7px; height: 7px; background: var(--b3); flex-shrink: 0; }
  .dot.green { background: var(--green); }
  .dot.yellow { background: var(--amber); animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .server-actions { display: flex; gap: 6px; margin-top: 8px; }
  .server-actions button {
    flex: 1;
    font-family: inherit;
    font-size: 15px;
    padding: 5px 8px;
    border: 1px solid var(--b2);
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    border-radius: 0;
  }
  .server-actions button:hover { color: var(--text); border-color: var(--b3); }

  /* ── launch button ── */
  #launch-btn {
    display: block;
    width: calc(100% - 36px);
    margin: 16px 18px;
    padding: 11px;
    background: var(--hi);
    color: var(--bg);
    border: none;
    font-family: inherit;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 1.5px;
    cursor: pointer;
    border-radius: 0;
  }
  #launch-btn:hover { background: #fff; }
  #launch-btn:disabled { background: var(--b1); color: var(--muted); cursor: default; }

  /* ── right panel ── */
  .right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .tab-bar {
    display: flex;
    padding: 0 20px;
    background: var(--s1);
    border-bottom: 1px solid var(--b1);
    flex-shrink: 0;
    height: 42px;
  }
  .tab {
    padding: 0 16px;
    height: 100%;
    display: flex;
    align-items: center;
    font-size: 16px;
    cursor: pointer;
    border-bottom: 1px solid transparent;
    color: var(--muted);
  }
  .tab.active { color: var(--hi); border-bottom-color: var(--hi); }
  .tab-content { flex: 1; overflow: hidden; display: none; }
  .tab-content.active { display: flex; flex-direction: column; }

  /* ── prompt tab ── */
  #prompt-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 18px 20px;
    gap: 14px;
    background: var(--bg);
  }
  .prompt-row { display: flex; flex-direction: column; gap: 4px; }
  .prompt-row label { margin-top: 0; font-size: 15px; }
  #task-desc { height: 90px; }
  #system-prompt { min-height: 200px; flex: 1; font-family: 'Courier New', Courier, monospace; font-size: 14px; }
  .prompt-row.grow { flex: 1; display: flex; flex-direction: column; }
  .prompt-row.grow textarea { flex: 1; }
  .prompt-actions { display: flex; gap: 8px; align-items: center; }
  .prompt-actions input { flex: 1; }
  #gen-btn {
    flex-shrink: 0;
    padding: 7px 16px;
    background: var(--bg);
    border: 1px solid var(--b2);
    color: var(--text);
    font-family: inherit;
    font-size: 16px;
    cursor: pointer;
    white-space: nowrap;
    border-radius: 0;
  }
  #gen-btn:hover { border-color: var(--hi); color: var(--hi); }
  #gen-btn:disabled { color: var(--muted); border-color: var(--b1); cursor: default; }
  #gen-status { font-size: 15px; color: var(--muted); min-height: 16px; font-style: italic; }
  .max-score-row { display: flex; align-items: center; gap: 12px; }
  .max-score-row label { margin: 0; flex-shrink: 0; }
  .max-score-row input { width: 70px; flex-shrink: 0; }

  /* ── logs tab ── */
  #logs-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .logs-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 20px;
    height: 38px;
    background: var(--s1);
    border-bottom: 1px solid var(--b1);
    flex-shrink: 0;
  }
  #log-status { font-size: 15px; color: var(--muted); flex: 1; font-style: italic; }
  .logs-toolbar button {
    font-family: inherit;
    font-size: 15px;
    padding: 3px 12px;
    border: 1px solid var(--b2);
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    border-radius: 0;
  }
  .logs-toolbar button:hover { color: var(--text); border-color: var(--b3); }
  #log-out {
    flex: 1;
    overflow-y: auto;
    padding: 14px 20px;
    font: 13px/1.7 'Courier New', Courier, monospace;
    white-space: pre-wrap;
    background: #060605;
    color: #8a8278;
  }

  /* ── cache tab ── */
  #cache-panel { flex: 1; overflow-y: auto; padding: 18px 20px; background: var(--bg); }
  .cache-entry {
    background: var(--s1);
    border: 1px solid var(--b1);
    border-left: 3px solid var(--green);
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .cache-entry h3 { font-size: 17px; font-weight: 600; color: var(--green); margin-bottom: 6px; }
  .cache-entry p { font-size: 16px; color: var(--muted); line-height: 2; }

  /* ── runs tab ── */
  #runs-panel { flex: 1; overflow-y: auto; padding: 18px 20px; background: var(--bg); }
  .run-entry {
    background: var(--s1);
    border: 1px solid var(--b1);
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
  }
  .run-entry:hover { border-color: var(--b3); }
  .run-entry .tag {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .tag.running { background: var(--gd); color: var(--green); border: 1px solid var(--green); }
  .tag.done { background: var(--s2); color: var(--muted); border: 1px solid var(--b2); }
  .run-entry .run-meta { flex: 1; font-size: 16px; color: var(--muted); }
  .kill-btn {
    font-family: inherit;
    font-size: 15px;
    padding: 3px 10px;
    border: 1px solid var(--red);
    background: var(--bg);
    color: var(--red);
    cursor: pointer;
    border-radius: 0;
  }
  .kill-btn:hover { background: #1a0808; }

  .empty {
    color: var(--muted);
    font-size: 17px;
    font-style: italic;
    padding: 32px;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>Gavel</h1>
  <nav>
    <button class="active" onclick="showMainTab('launch')">Launch</button>
    <button onclick="showMainTab('cache')">Cache</button>
    <button onclick="showMainTab('runs')">Runs</button>
  </nav>
</header>

<div class="workspace">
  <!-- ── LEFT PANEL ── -->
  <div class="left" id="left-panel">
    <div class="section">
      <div class="section-title">Run Type</div>
      <select id="run-type" onchange="onRunTypeChange()">
        <option value="grpo">GRPO Training</option>
        <option value="sft">SFT (distill grader)</option>
        <option value="audit">Audit grader</option>
      </select>
    </div>

    <div class="section">
      <div class="section-title">Dataset</div>
      <label>Dataset ID</label>
      <input id="dataset-id" value="BytedTsinghua-SIA/DAPO-Math-17k" oninput="debounceDatasetLookup()">

      <div id="cache-banner">
        <div class="banner-title">&#x2713; Cached grader found</div>
        <div id="banner-meta" class="banner-meta">—</div>
        <div class="toggle-row">
          <div class="toggle-btn active" id="btn-cached" onclick="setJudgeMode('cached')">Distilled grader</div>
          <div class="toggle-btn" id="btn-frontier" onclick="setJudgeMode('frontier')">Frontier judge</div>
        </div>
        <div id="grader-server-widget">
          <div class="server-status">
            <div class="dot" id="server-dot"></div>
            <span id="server-status-text">Stopped</span>
          </div>
          <div class="server-actions">
            <button onclick="startGraderServer()">Start server</button>
            <button onclick="stopGraderServer()">Stop</button>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Hardware</div>
      <label>GPU IDs (CUDA_VISIBLE_DEVICES)</label>
      <input id="gpus" value="0,1,2,3">
      <label>Num GPUs (for GRPO)</label>
      <input id="num-gpus" type="number" value="4" min="1">
    </div>

    <div class="section" id="grpo-fields">
      <div class="section-title">GRPO Config</div>
      <label>Policy model</label>
      <input id="policy-model" value="Qwen/Qwen3-4B">
      <div id="judge-frontier-fields">
        <label>Judge URL</label>
        <input id="judge-url" value="https://api.deepseek.com/v1">
        <label>Judge API key</label>
        <input id="judge-api-key" type="password" value="">
        <label>Judge model name</label>
        <input id="judge-model" value="deepseek-v4-flash">
      </div>
      <label>Batch size</label>
      <input id="batch-size" type="number" value="2" min="1">
      <label>Grad accum</label>
      <input id="grad-accum" type="number" value="2" min="1">
      <label>Num generations</label>
      <input id="num-generations" type="number" value="4" min="1">
      <label>Max steps</label>
      <input id="max-steps" type="number" value="200" min="1">
      <label>Learning rate</label>
      <input id="lr" value="1e-5">
      <label>N examples</label>
      <input id="n-examples" type="number" value="3000" min="1">
    </div>

    <div class="section" id="sft-fields" style="display:none">
      <div class="section-title">SFT Config</div>
      <label>Grader base model</label>
      <input id="grader-base" value="Qwen/Qwen3-4B-Instruct-2507">
      <label>Adapter output path</label>
      <input id="sft-out" value="runs/grader-sft">
      <label>Epochs</label>
      <input id="epochs" type="number" value="3" min="1">
    </div>

    <div class="section" id="audit-fields" style="display:none">
      <div class="section-title">Audit Config</div>
      <label>Adapter path</label>
      <input id="audit-sft-out" value="runs/grader-sft">
    </div>

    <button id="launch-btn" onclick="launchRun()">Launch</button>
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="right">
    <div class="tab-bar">
      <div class="tab active" id="tab-prompt" onclick="showRightTab('prompt')">Prompt</div>
      <div class="tab" id="tab-logs" onclick="showRightTab('logs')">Logs</div>
    </div>

    <!-- PROMPT TAB -->
    <div class="tab-content active" id="right-prompt">
      <div id="prompt-panel">
        <div class="prompt-row">
          <label>Describe the task to grade (DeepSeek will generate the rubric)</label>
          <textarea id="task-desc" placeholder="e.g. Solving high-school math competition problems with step-by-step reasoning…"></textarea>
        </div>

        <div class="prompt-actions">
          <input id="deepseek-key" type="password" placeholder="DeepSeek API key">
          <button id="gen-btn" onclick="generateRubric()">Generate rubric</button>
        </div>
        <div id="gen-status"></div>

        <div class="max-score-row">
          <label>Max score</label>
          <input id="max-score" type="number" value="1" min="1" step="1">
        </div>

        <div class="prompt-row grow">
          <label>Judge system prompt (editable — used when launching GRPO)</label>
          <textarea id="system-prompt" placeholder="Generate a rubric above, or paste a system prompt here…"></textarea>
        </div>
      </div>
    </div>

    <!-- LOGS TAB -->
    <div class="tab-content" id="right-logs">
      <div id="logs-panel">
        <div class="logs-toolbar">
          <div class="dot" id="run-dot"></div>
          <span id="log-status">No run yet</span>
          <button onclick="killRun()">Kill</button>
          <button onclick="clearLogs()">Clear</button>
        </div>
        <div id="log-out"></div>
      </div>
    </div>
  </div>
</div>

<!-- CACHE TAB (replaces workspace) -->
<div id="cache-page" style="display:none; flex:1; overflow-y:auto; padding:18px 20px; background:var(--bg);">
  <div id="cache-panel"></div>
</div>

<!-- RUNS TAB -->
<div id="runs-page" style="display:none; flex:1; overflow-y:auto; padding:18px 20px; background:var(--bg);">
  <div id="runs-panel"></div>
</div>

<script>
// ── state ──────────────────────────────────────────────────────────────────
let activeRunId = null;
let evtSource = null;
let judgeMode = 'frontier'; // 'cached' | 'frontier'
let cachedEntry = null;
let graderPollTimer = null;
let datasetDebounce = null;

// ── nav ────────────────────────────────────────────────────────────────────
function showMainTab(tab) {
  document.querySelectorAll('nav button').forEach((b, i) => {
    b.classList.toggle('active', ['launch', 'cache', 'runs'][i] === tab);
  });
  document.querySelector('.workspace').style.display = tab === 'launch' ? 'flex' : 'none';
  document.getElementById('cache-page').style.display = tab === 'cache' ? 'flex' : 'none';
  document.getElementById('runs-page').style.display = tab === 'runs' ? 'flex' : 'none';
  if (tab === 'cache') loadCachePage();
  if (tab === 'runs') loadRunsPage();
}

function showRightTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.id === 'tab-' + tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'right-' + tab));
}

// ── run type ───────────────────────────────────────────────────────────────
function onRunTypeChange() {
  const t = document.getElementById('run-type').value;
  document.getElementById('grpo-fields').style.display = t === 'grpo' ? '' : 'none';
  document.getElementById('sft-fields').style.display = t === 'sft' ? '' : 'none';
  document.getElementById('audit-fields').style.display = t === 'audit' ? '' : 'none';
}

// ── dataset lookup ─────────────────────────────────────────────────────────
function debounceDatasetLookup() {
  clearTimeout(datasetDebounce);
  datasetDebounce = setTimeout(lookupDataset, 600);
}

async function lookupDataset() {
  const did = document.getElementById('dataset-id').value.trim();
  if (!did) { hideCacheBanner(); return; }
  try {
    const res = await fetch('/api/cache/lookup?dataset_id=' + encodeURIComponent(did));
    const entries = await res.json();
    if (entries && entries.length > 0) {
      cachedEntry = entries[0];
      showCacheBanner(cachedEntry);
    } else {
      hideCacheBanner();
    }
  } catch { hideCacheBanner(); }
}

function auditPearson(entry) {
  if (!entry) return null;
  return entry.pearson ?? null;
}

function showCacheBanner(entry) {
  const banner = document.getElementById('cache-banner');
  const p = auditPearson(entry);
  const traces = entry.trace_count ?? '?';
  document.getElementById('banner-meta').textContent =
    `Pearson ${p != null ? p.toFixed(3) : '?'} · ${traces} traces · ${entry.grader_base}`;
  banner.classList.add('show');
  setJudgeMode('cached');
}

function hideCacheBanner() {
  document.getElementById('cache-banner').classList.remove('show');
  cachedEntry = null;
  setJudgeMode('frontier');
}

// ── judge mode toggle ──────────────────────────────────────────────────────
function setJudgeMode(mode) {
  judgeMode = mode;
  document.getElementById('btn-cached').classList.toggle('active', mode === 'cached');
  document.getElementById('btn-frontier').classList.toggle('active', mode === 'frontier');
  const widget = document.getElementById('grader-server-widget');
  const frontierFields = document.getElementById('judge-frontier-fields');
  if (mode === 'cached') {
    widget.classList.add('show');
    frontierFields.style.display = 'none';
    startGraderPoll();
  } else {
    widget.classList.remove('show');
    frontierFields.style.display = '';
    stopGraderPoll();
  }
}

// ── grader server ──────────────────────────────────────────────────────────
async function startGraderServer() {
  const did = document.getElementById('dataset-id').value.trim();
  const base = cachedEntry ? cachedEntry.grader_base : '';
  const gpu = '7';
  await fetch(`/api/grader-server/start?dataset_id=${encodeURIComponent(did)}&grader_base=${encodeURIComponent(base)}&gpu=${gpu}`, { method: 'POST' });
  pollGraderStatus();
}

async function stopGraderServer() {
  await fetch('/api/grader-server', { method: 'DELETE' });
  pollGraderStatus();
}

async function pollGraderStatus() {
  const res = await fetch('/api/grader-server/status');
  const data = await res.json();
  const dot = document.getElementById('server-dot');
  const txt = document.getElementById('server-status-text');
  if (data.status === 'running') {
    dot.className = 'dot green';
    txt.textContent = `Running :${data.port}`;
    if (judgeMode === 'cached') {
      document.getElementById('judge-url').value = `http://localhost:${data.port}/v1`;
      document.getElementById('judge-model').value = 'grader';
    }
  } else {
    dot.className = 'dot';
    txt.textContent = 'Stopped';
  }
}

function startGraderPoll() {
  if (graderPollTimer) return;
  pollGraderStatus();
  graderPollTimer = setInterval(pollGraderStatus, 3000);
}

function stopGraderPoll() {
  clearInterval(graderPollTimer);
  graderPollTimer = null;
}

// ── rubric generation ──────────────────────────────────────────────────────
async function generateRubric() {
  const desc = document.getElementById('task-desc').value.trim();
  const key = document.getElementById('deepseek-key').value.trim();
  if (!desc) { setGenStatus('Enter a task description.'); return; }
  if (!key) { setGenStatus('Enter your DeepSeek API key.'); return; }

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  setGenStatus('Generating…');
  try {
    const res = await fetch('/api/generate-rubric', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ description: desc, api_key: key }),
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    document.getElementById('system-prompt').value = data.rubric;
    document.getElementById('max-score').value = data.max_score;
    setGenStatus('✓ Rubric generated');
  } catch (e) {
    setGenStatus('Error: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

function setGenStatus(msg) {
  document.getElementById('gen-status').textContent = msg;
}

// ── launch ─────────────────────────────────────────────────────────────────
async function launchRun() {
  const runType = document.getElementById('run-type').value;
  const sysPrompt = document.getElementById('system-prompt').value.trim();
  const maxScore = parseFloat(document.getElementById('max-score').value) || 1;

  const graderBaseEl = document.getElementById('grader-base');
  const graderBase = cachedEntry ? cachedEntry.grader_base : (graderBaseEl ? graderBaseEl.value.trim() : '');
  const body = {
    run_type: runType,
    dataset_id: document.getElementById('dataset-id').value.trim(),
    grader_base: graderBase,
    gpus: document.getElementById('gpus').value.trim(),
    num_gpus: parseInt(document.getElementById('num-gpus').value) || 4,
    judge_system_prompt: sysPrompt,
    judge_max_score: maxScore,
  };

  if (runType === 'grpo') {
    body.policy_model = document.getElementById('policy-model').value.trim();
    body.judge_url = document.getElementById('judge-url').value.trim();
    body.judge_api_key = document.getElementById('judge-api-key').value.trim();
    body.judge_model = document.getElementById('judge-model').value.trim();
    body.batch_size = parseInt(document.getElementById('batch-size').value);
    body.grad_accum = parseInt(document.getElementById('grad-accum').value);
    body.num_generations = parseInt(document.getElementById('num-generations').value);
    body.max_steps = parseInt(document.getElementById('max-steps').value);
    body.lr = parseFloat(document.getElementById('lr').value);
    body.n_examples = parseInt(document.getElementById('n-examples').value);
  } else if (runType === 'sft') {
    body.sft_out = document.getElementById('sft-out').value.trim();
    body.epochs = parseInt(document.getElementById('epochs').value);
  } else if (runType === 'audit') {
    body.sft_out = document.getElementById('audit-sft-out').value.trim();
  }

  const res = await fetch('/api/launch', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!res.ok) { alert('Launch failed: ' + JSON.stringify(data)); return; }

  activeRunId = data.run_id;
  clearLogs();
  showRightTab('logs');
  document.getElementById('log-status').textContent = `Run ${activeRunId} — ${runType}`;
  document.getElementById('run-dot').className = 'dot yellow';
  startStream(activeRunId);
}

// ── log streaming ──────────────────────────────────────────────────────────
function startStream(runId) {
  if (evtSource) evtSource.close();
  evtSource = new EventSource(`/api/runs/${runId}/stream`);
  const out = document.getElementById('log-out');
  evtSource.onmessage = e => {
    out.textContent += JSON.parse(e.data) + '\n';
    out.scrollTop = out.scrollHeight;
  };
  evtSource.onerror = () => {
    document.getElementById('run-dot').className = 'dot';
    evtSource.close();
  };
}

async function killRun() {
  if (!activeRunId) return;
  await fetch(`/api/runs/${activeRunId}`, { method: 'DELETE' });
  document.getElementById('run-dot').className = 'dot';
}

function clearLogs() {
  document.getElementById('log-out').textContent = '';
}

// ── cache page ─────────────────────────────────────────────────────────────
async function loadCachePage() {
  const panel = document.getElementById('cache-panel');
  panel.innerHTML = '<div class="empty">Loading…</div>';
  const res = await fetch('/api/cache');
  const entries = await res.json();
  if (!entries.length) { panel.innerHTML = '<div class="empty">No cached graders yet.</div>'; return; }
  panel.innerHTML = entries.map(e => {
    const p = auditPearson(e);
    return `<div class="cache-entry">
      <h3>${e.dataset_id || '?'}</h3>
      <p>
        Base: ${e.grader_base || '?'}<br>
        Pearson: ${p != null ? p.toFixed(3) : '?'}<br>
        Traces: ${e.trace_count ?? '?'}<br>
        Adapter: ${e.adapter_path || '?'}
      </p>
    </div>`;
  }).join('');
}

// ── runs page ──────────────────────────────────────────────────────────────
async function loadRunsPage() {
  const panel = document.getElementById('runs-panel');
  panel.innerHTML = '<div class="empty">Loading…</div>';
  const res = await fetch('/api/runs');
  const runs = await res.json();
  if (!runs.length) { panel.innerHTML = '<div class="empty">No runs yet.</div>'; return; }
  panel.innerHTML = runs.map(r => `
    <div class="run-entry" onclick="viewRun('${r.run_id}')">
      <span class="tag ${r.status}">${r.status}</span>
      <div class="run-meta">${r.run_id} — ${r.run_type} · ${r.lines} lines</div>
      ${r.status === 'running' ? `<button class="kill-btn" onclick="event.stopPropagation(); killRunById('${r.run_id}')">Kill</button>` : ''}
    </div>`).join('');
}

async function viewRun(runId) {
  activeRunId = runId;
  showMainTab('launch');
  clearLogs();
  showRightTab('logs');
  document.getElementById('log-status').textContent = `Run ${runId}`;
  startStream(runId);
}

async function killRunById(runId) {
  await fetch(`/api/runs/${runId}`, { method: 'DELETE' });
  loadRunsPage();
}

// ── init ───────────────────────────────────────────────────────────────────
lookupDataset();
onRunTypeChange();
</script>
</body>
</html>
